<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts Institute | Sorting Ceremony</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,650;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #030307;
            --text-main: #e2e8f0;
            --gold: #c9a054;
            --gold-light: #f3e5ab;
            --font-title: 'Cinzel', serif;
            --font-text: 'Playfair Display', serif;
        }

        body {
            background: radial-gradient(circle at center, #0a0a16 0%, var(--bg-color) 100%);
            color: var(--text-main);
            font-family: var(--font-text);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 2s ease, box-shadow 2s ease;
        }

        /* === BACKGROUND BINTANG MAGIS === */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .stars::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 30px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 180px, rgba(201, 160, 84, 0.7), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 200px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 280px 140px, rgba(255,255,255,0.9), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 300px 300px;
            animation: twinkle 8s infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.9; transform: scale(1.02); }
        }

        /* === HERO / WELCOME SCREEN === */
        header {
            text-align: center;
            padding: 40px 20px;
            max-width: 700px;
            animation: fadeInDown 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Bingkai Gambar Utama di Halaman Depan */
        .hero-image-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 0 35px rgba(201, 160, 84, 0.3);
        }

        .hero-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-sub {
            font-family: var(--font-title);
            font-size: 0.9rem;
            letter-spacing: 6px;
            color: #8a8a9d;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 4rem;
            color: var(--gold);
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #785920 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(201, 160, 84, 0.15);
            margin-bottom: 20px;
            letter-spacing: 4px;
            font-weight: 700;
        }

        p.subtitle {
            font-size: 1.2rem;
            font-style: italic;
            color: #a0aec0;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        /* === TOMBOL MEWAH === */
        .btn {
            background: transparent;
            color: var(--gold-light);
            font-family: var(--font-title);
            border: 1px solid var(--gold);
            padding: 16px 45px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .btn:hover {
            color: #000;
            background: var(--gold);
            box-shadow: 0 0 25px rgba(201, 160, 84, 0.5);
            transform: translateY(-2px);
        }

        /* === WADAH KUIS & HASIL (GLASSMORPHISM) === */
        #quiz-container, #result-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 800px;
            background: rgba(10, 10, 20, 0.55);
            border: 1px solid rgba(201, 160, 84, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255,255,255,0.02);
            animation: fadeIn 1s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        /* Dekorasi Sudut Bingkai Kastil */
        #quiz-container::before, #quiz-container::after,
        #result-container::before, #result-container::after {
            content: "";
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--gold);
            pointer-events: none;
            opacity: 0.6;
        }
        #quiz-container::before, #result-container::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
        #quiz-container::after, #result-container::after { bottom: 12px; right: 12px; border-left: none; border-top: none; }

        /* === VISUAL PROGRESS BAR === */
        .progress-wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
        }

        .progress-bar {
            font-family: var(--font-title);
            color: var(--gold);
            font-size: 0.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .progress-line-bg {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-line-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #785920, var(--gold-light));
            box-shadow: 0 0 10px var(--gold);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question {
            font-family: var(--font-title);
            font-size: 1.8rem;
            margin-bottom: 40px;
            text-align: center;
            color: #fff;
            line-height: 1.5;
            font-weight: 400;
        }

        /* === LAYOUT PILIHAN JAWABAN === */
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            width: 100%;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            padding: 22px 28px;
            font-family: var(--font-text);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: left;
            line-height: 1.6;
            border-radius: 6px;
        }

        .option-btn:hover {
            border-color: var(--gold);
            color: #fff;
            background: linear-gradient(90deg, rgba(201, 160, 84, 0.08), rgba(0,0,0,0));
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* === TAMPILAN HASIL AKHIR === */
        .house-image-wrapper {
            width: 240px;
            height: 240px;
            margin-bottom: 30px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            position: relative;
            animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .house-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .house-crest {
            font-family: var(--font-title);
            font-size: 3.5rem;
            margin-bottom: 15px;
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: popIn 1s ease;
        }

        .house-desc {
            font-size: 1.25rem;
            text-align: center;
            max-width: 600px;
            line-height: 1.9;
            color: #cbd5e1;
            font-style: italic;
        }

        /* Aura Kamar Asrama Tergantung Hasil Akhir */
        .house-Gryffindor { background: radial-gradient(circle at center, #270102 0%, var(--bg-color) 100%); box-shadow: inset 0 0 300px rgba(116, 0, 1, 0.7); }
        .house-Slytherin { background: radial-gradient(circle at center, #072010 0%, var(--bg-color) 100%); box-shadow: inset 0 0 300px rgba(26, 71, 42, 0.7); }
        .house-Ravenclaw { background: radial-gradient(circle at center, #050d24 0%, var(--bg-color) 100%); box-shadow: inset 0 0 300px rgba(14, 26, 64, 0.7); }
        .house-Hufflepuff { background: radial-gradient(circle at center, #2e2307 0%, var(--bg-color) 100%); box-shadow: inset 0 0 300px rgba(238, 185, 57, 0.3); }

        /* === ANIMASI === */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Responsif untuk Layar HP */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .question { font-size: 1.4rem; }
            .option-btn { font-size: 1rem; padding: 16px 20px; }
            #quiz-container, #result-container { padding: 35px 20px; }
            .house-crest { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <header id="hero">
        <div class="hero-image-wrapper">
            <img src="https://images.unsplash.com/photo-1508849789987-4e5333c12b78?w=400&auto=format&fit=crop&q=80" alt="Hogwarts Castle">
        </div>
        <div class="logo-sub">Welcome to</div>
        <h1>Hogwarts Institute</h1>
        <p class="subtitle">Upacara seleksi sakral dimulai kembali. Sifat alami, insting, dan keputusan moralmu akan menentukan di menara asrama mana kamu layak ditempatkan.</p>
        <button class="btn" onclick="startQuiz()">Ikuti Seleksi</button>
    </header>

    <main>
        <div id="quiz-container">
            <div class="progress-wrapper">
                <div class="progress-bar" id="progress-text">Ceremony Progress: 1 / 15</div>
                <div class="progress-line-bg">
                    <div class="progress-line-fill" id="progress-fill"></div>
                </div>
            </div>
            <h2 class="question" id="question-text">Memuat Pertanyaan...</h2>
            <div class="options" id="options-container"></div>
        </div>

        <div id="result-container">
            <div class="house-image-wrapper">
                <img id="house-img" src="" alt="Lambang Kehormatan Asrama">
            </div>
            <div class="logo-sub" style="margin-bottom: 5px;">Asrama Kamu Adalah</div>
            <h2 class="house-crest" id="house-name">RUMAH</h2>
            <p class="house-desc" id="house-desc">Menganalisis jiwamu...</p>
            <br><br>
            <button class="btn" onclick="location.reload()">Ulangi Penyeleksian</button>
        </div>
    </main>

    <script>
        // === 15 SOAL IMERSIF ALA POTTERMORE ===
        const questions = [
            {
                text: "Matahari terbit atau terbenam?",
                options: [
                    { text: "Fajar yang membawa cahaya dan awal baru.", scores: { Gryffindor: 1, Ravenclaw: 1 } },
                    { text: "Senja yang menyimpan kedamaian dan misteri malam.", scores: { Slytherin: 1, Hufflepuff: 1 } }
                ]
            },
            {
                text: "Suara mana yang paling membuat jiwamu merasa tenang?",
                options: [
                    { text: "Desis api unggun yang berkobar hangat di malam dingin.", scores: { Gryffindor: 2 } },
                    { text: "Hembusan angin kencang di pucuk menara tinggi.", scores: { Ravenclaw: 2 } },
                    { text: "Suara teratur tetesan air di dalam gua bawah tanah yang sunyi.", scores: { Slytherin: 2 } },
                    { text: "Kresek dedaunan kering yang diinjak di tengah hutan lebat.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Kamu melihat teman sekelas berbuat curang dalam ujian ramuan penting. Apa tindakanmu?",
                options: [
                    { text: "Menghadapinya langsung setelah ujian selesai tanpa rasa takut.", scores: { Gryffindor: 2 } },
                    { text: "Melaporkannya diam-diam kepada Profesor karena aturan harus ditegakkan.", scores: { Ravenclaw: 2 } },
                    { text: "Membiarkannya. Setiap orang menggunakan caranya sendiri untuk bertahan hidup.", scores: { Slytherin: 2 } },
                    { text: "Mendekatinya nanti untuk membantu belajar agar dia tidak perlu curang lagi.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Empat ramuan misterius diletakkan di depanmu. Mana yang aromanya paling memikatmu?",
                options: [
                    { text: "Aroma laut, kayu bakar yang terbakar, dan embun pagi.", scores: { Gryffindor: 2 } },
                    { text: "Aroma kertas perkamen baru, tinta murni, dan buku-buku tua.", scores: { Ravenclaw: 2 } },
                    { text: "Aroma mint, es mentol, dan ramuan langka yang mahal.", scores: { Slytherin: 2 } },
                    { text: "Aroma roti panggang, tanah basah setelah hujan, dan bunga rumah.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Jika diberi kesempatan menjelajahi kastil malam-malam, ke mana kamu akan menyelinap?",
                options: [
                    { text: "Puncak Menara Astronomi untuk melihat batas cakrawala.", scores: { Gryffindor: 2 } },
                    { text: "Bagian Terlarang di Perpustakaan untuk mencari mantra kuno.", scores: { Ravenclaw: 2 } },
                    { text: "Ruang bawah tanah rahasia di balik dinding asrama.", scores: { Slytherin: 2 } },
                    { text: "Dapur kastil yang hangat, tempat para peri rumah bekerja.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Dari hal-hal berikut, apa ketakutan terbesarmu jika kamu gagal di masa depan?",
                options: [
                    { text: "Terlihat lemah dan pengecut di hadapan orang yang meremehkanku.", scores: { Gryffindor: 2 } },
                    { text: "Membuat keputusan fatal karena kurangnya pengetahuan.", scores: { Ravenclaw: 2 } },
                    { text: "Kehilangan kendali atas nasib dan masa depanku sendiri.", scores: { Slytherin: 2 } },
                    { text: "Mengecewakan orang-orang yang tulus menyayangi dan memercayaiku.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Makhluk gaib mana yang paling ingin kamu pelajari jalurnya atau kamu jinakkan?",
                options: [
                    { text: "Naga yang agung, berbahaya, dan bernapas api.", scores: { Gryffindor: 2 } },
                    { text: "Sphinx yang suka berbicara menggunakan teka-teki rumit.", scores: { Ravenclaw: 2 } },
                    { text: "Basilisk yang bergerak dalam bayangan gelap.", scores: { Slytherin: 2 } },
                    { text: "Hippogriff yang membutuhkan rasa hormat dan kesabaran tinggi.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Sebuah pintu besi kuno terkunci rapat menghalangi jalanmu. Bagaimana caramu lewat?",
                options: [
                    { text: "Mencari mantra penghancur atau mendobraknya dengan kekuatan.", scores: { Gryffindor: 2 } },
                    { text: "Menganalisis simbol tersembunyi di gagang pintu untuk memecahkan kodenya.", scores: { Ravenclaw: 2 } },
                    { text: "Mencari jalan memutar atau trik khusus untuk mengakalinya.", scores: { Slytherin: 2 } },
                    { text: "Mengetuknya dengan tenang atau menunggu seseorang membukanya dari dalam.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Jika takdir menuntutmu memilih arah tanpa kompas, jalan mana yang kamu ambil?",
                options: [
                    { text: "Jalan ke kanan, yang terlihat terang namun terjal.", scores: { Gryffindor: 1, Hufflepuff: 1 } },
                    { text: "Jalan ke kiri, yang redup namun tampak menyimpan rahasia.", scores: { Slytherin: 1, Ravenclaw: 1 } }
                ]
            },
            {
                text: "Benda antik apa yang akan kamu ambil dari meja seorang penyihir tua?",
                options: [
                    { text: "Belati perak bertatahkan batu ruby yang memancarkan aura berani.", scores: { Gryffindor: 2 } },
                    { text: "Teropong bintang kuno yang bisa memetakan rasi planet gaib.", scores: { Ravenclaw: 2 } },
                    { text: "Cincin batu zamrud hitam yang terasa dingin saat disentuh.", scores: { Slytherin: 2 } },
                    { text: "Cangkir tanah liat sederhana yang tidak pernah kehabisan air hangat.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Apa yang paling kamu harapkan orang katakan tentang dirimu setelah kamu tiada?",
                options: [
                    { text: "\"Kisah-kisah keberaniannya akan terus diceritakan ulang.\"", scores: { Gryffindor: 2 } },
                    { text: "\"Pikiran dan kebijaksanaannya meninggalkan warisan besar.\"", scores: { Ravenclaw: 2 } },
                    { text: "\"Dia mencapai kejayaan besar yang ditakuti sekaligus dikagumi.\"", scores: { Slytherin: 2 } },
                    { text: "\"Dia adalah sosok paling setia dan sahabat terbaik yang pernah ada.\"", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Jenis cuaca apa yang membuat energi sihirmu terasa paling membara?",
                options: [
                    { text: "Badai petir yang menggelegar hebat membelah langit.", scores: { Gryffindor: 2 } },
                    { text: "Malam musim dingin yang sangat dingin, jernih, dan penuh bintang.", scores: { Ravenclaw: 2 } },
                    { text: "Kabut tebal di pagi buta yang menyelimuti seluruh pandangan.", scores: { Slytherin: 2 } },
                    { text: "Sore hari yang cerah dengan angin sepoi-sepoi yang hangat.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Seseorang melayangkan tuduhan palsu kepadamu di depan umum. Apa reaksi pertamamu?",
                options: [
                    { text: "Marah besar dan langsung menantangnya berdebat saat itu juga.", scores: { Gryffindor: 2 } },
                    { text: "Menahan diri dan menyusun bukti logis untuk mematahkan argumennya.", scores: { Ravenclaw: 2 } },
                    { text: "Tetap tenang, lalu mencari tahu siapa dalang di balik penjebakan ini untuk membalasnya.", scores: { Slytherin: 2 } },
                    { text: "Menjelaskan yang sebenarnya dengan damai, percaya kebenaran akan terungkap.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Empat kotak tersaji di depanmu. Kotak mana yang akan kamu buka?",
                options: [
                    { text: "Kotak emas di atas cakar elang yang bertuliskan rahasia keberanian.", scores: { Gryffindor: 2 } },
                    { text: "Kotak safir biru berkilau yang mengeluarkan suara bisikan lembut.", scores: { Ravenclaw: 2 } },
                    { text: "Kotak hitam legam dengan ukiran ular perak melingkar.", scores: { Slytherin: 2 } },
                    { text: "Kotak kayu ek tua polos yang berbau harum seperti hutan.", scores: { Hufflepuff: 2 } }
                ]
            },
            {
                text: "Saat tersesat di dalam labirin sihir yang terus berubah, apa yang paling kamu andalkan?",
                options: [
                    { text: "Insting tajam dan tekad kuat untuk terus melangkah maju.", scores: { Gryffindor: 2 } },
                    { text: "Ingatan visual dan pengamatan struktur pola dinding labirin.", scores: { Ravenclaw: 2 } },
                    { text: "Mencari jalan pintas rahasia atau celah di balik mekanisme labirin.", scores: { Slytherin: 2 } },
                    { text: "Tetap tenang, menghemat energi, dan menandai jalan secara sabar.", scores: { Hufflepuff: 2 } }
                ]
            }
        ];

        // === DATA ASRAMA ===
        const houseData = {
            Gryffindor: { 
                color: "#ff3e3e", 
                name: "GRYFFINDOR", 
                image: "https://images.unsplash.com/photo-1602491453977-18a36d3559fb?w=400&auto=format&fit=crop&q=80", 
                desc: "Di sinilah tempat bernaungnya mereka yang berani, berjiwa ksatria, dan memiliki nyali besar. Hogwarts Institute bangga menyambut api keberanian yang menyala terang di dalam jiwamu." 
            },
            Slytherin: { 
                color: "#2ecc71", 
                name: "SLYTHERIN", 
                image: "https://images.unsplash.com/photo-1545249390-6bdfa286032f?w=400&auto=format&fit=crop&q=80", 
                desc: "Tempat bagi mereka yang cerdik, ambisius, dan penuh tekad untuk mencapai kejayaan. Kamu tahu cara memanfaatkan peluang dan siap memimpin dengan keanggunan yang tajam." 
            },
            Ravenclaw: { 
                color: "#3498db", 
                name: "RAVENCLAW", 
                image: "https://images.unsplash.com/photo-1551250936-2640ce790111?w=400&auto=format&fit=crop&q=80", 
                desc: "Rumah bagi kecerdasan, kreativitas, dan rasa ingin tahu yang tak terbatas. Pikiranmu yang tajam dan analitis membuatmu sangat cocok berada di antara para pencari kebenaran di Institut ini." 
            },
            Hufflepuff: { 
                color: "#f1c40f", 
                name: "HUFFLEPUFF", 
                image: "https://images.unsplash.com/photo-1589656966895-2f33e7653819?w=400&auto=format&fit=crop&q=80", 
                desc: "Asrama bagi mereka yang tulus, setia, adil, dan pekerja keras. Kamu menghargai persahabatan di atas segalanya dan memiliki hati emas yang bisa diandalkan dalam situasi apa pun." 
            }
        };

        let currentQuestionIndex = 0;
        let scores = { Gryffindor: 0, Slytherin: 0, Ravenclaw: 0, Hufflepuff: 0 };

        function startQuiz() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'flex';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestionIndex];
            
            // Update Visual Progress Bar
            document.getElementById('progress-text').innerText = `Ceremony Progress: ${currentQuestionIndex + 1} / ${questions.length}`;
            const progressPercent = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progressPercent}%`;

            document.getElementById('question-text').innerText = q.text;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.scores);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(optionScores) {
            for (let house in optionScores) {
                if (scores[house] !== undefined) {
                    scores[house] += optionScores[house];
                }
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            // Penuhi Progress Bar di Akhir
            document.getElementById('progress-fill').style.width = '100%';

            setTimeout(() => {
                document.getElementById('quiz-container').style.display = 'none';
                const resultContainer = document.getElementById('result-container');
                resultContainer.style.display = 'flex';

                let winningHouse = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                const house = houseData[winningHouse];

                document.getElementById('house-img').src = house.image;

                const houseNameEl = document.getElementById('house-name');
                houseNameEl.innerText = house.name;
                houseNameEl.style.color = house.color;
                
                // Efek Glow Border pada Gambar Sesuai Rumah
                document.querySelector('#result-container .house-image-wrapper').style.borderColor = house.color;
                document.querySelector('#result-container .house-image-wrapper').style.boxShadow = `0 0 40px ${house.color}`;

                document.getElementById('house-desc').innerText = house.desc;
                document.body.className = `house-${winningHouse}`;
            }, 400);
        }
    </script>
</body>
</html>
